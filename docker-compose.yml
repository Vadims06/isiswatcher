services:
  isis-logstash:
    build:
      context: logstash/
      args:
        LOGSTASH_OSS_VERSION: $LOGSTASH_OSS_VERSION
    container_name: isis-logstash
    volumes:
      - type: bind
        source: ./logstash/config/logstash.yml
        target: /usr/share/logstash/config/logstash.yml
        read_only: true
      - type: bind
        source: ./logstash/pipeline
        target: /usr/share/logstash/pipeline
        read_only: true
      - type: bind
        source: ./watcher/logs
        target: /home/watcher/watcher/logs
        read_only: true
      # for containerlab integration
      # - type: bind
      #   source: /home/ubuntu/isiswatcher/watcher/logs/watcher.log
      #   target: /home/watcher/watcher/logs/watcher.log
      #   read_only: true
    environment:
      ELASTIC_USER_LOGIN: $ELASTIC_USER_LOGIN
      ELASTIC_USER_PASS: $ELASTIC_USER_PASS
      ELASTIC_IP: $ELASTIC_IP
      ELASTIC_PORT: $ELASTIC_PORT
      MONGODB_DATABASE: $MONGODB_DATABASE
      MONGODB_USERNAME: $MONGODB_USERNAME
      MONGODB_PASSWORD: $MONGODB_PASSWORD
      MONGODB_IP: $MONGODB_IP
      MONGODB_PORT: $MONGODB_PORT
      ZABBIX_HOST: $ZABBIX_HOST
      DEBUG_BOOL: $DEBUG_BOOL
      EXPORT_TO_MONGO_BOOL: $EXPORT_TO_MONGO_BOOL
      EXPORT_TO_ELASTICSEARCH_BOOL: $EXPORT_TO_ELASTICSEARCH_BOOL
      EXPORT_TO_ZABBIX_BOOL: $EXPORT_TO_ZABBIX_BOOL
      EXPORT_TO_WEBHOOK_URL_BOOL: $EXPORT_TO_WEBHOOK_URL_BOOL
      WEBHOOK_URL: $WEBHOOK_URL
      EXPORT_TO_TOPOLOGRAPH_SOCKET: $EXPORT_TO_TOPOLOGRAPH_SOCKET
      TOPOLOGRAPH_HOST: $TOPOLOGRAPH_HOST
      TOPOLOGRAPH_PORT: $TOPOLOGRAPH_PORT
    healthcheck:
      test: curl -s http://localhost:9600 >/dev/null || exit 1
      interval: 10s
      timeout: 10s
      retries: 50
    restart: unless-stopped
    depends_on:
      - isis-logstash-index-creator
    networks:
      - internal
    profiles:
      - logstash
  
  isis-logstash-index-creator:
    image: vadims06/isis-watcher:latest
    container_name: isis-logstash-index-creator
    volumes:
      - type: bind
        source: ./logstash/index_template/create.py
        target: /home/watcher/watcher/create.py
        read_only: true
    environment:
      EXPORT_TO_ELASTICSEARCH_BOOL: $EXPORT_TO_ELASTICSEARCH_BOOL
      ELASTIC_USER_LOGIN: $ELASTIC_USER_LOGIN
      ELASTIC_USER_PASS: $ELASTIC_USER_PASS
      ELASTIC_IP: $ELASTIC_IP
      ELASTIC_PORT: $ELASTIC_PORT
    entrypoint: ["python", "create.py"]
    healthcheck:
      test: curl -s http://${ELASTIC_IP}:${ELASTIC_PORT} >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 50
    networks:
      - internal
    profiles:
      - logstash

  isis-fluentbit:
    image: fluent/fluent-bit:latest
    container_name: isis-fluentbit
    command: ["-c", "/fluent-bit/etc/fluent-bit.yaml"]
    volumes:
      - type: bind
        source: ./fluentbit/fluent-bit.yaml
        target: /fluent-bit/etc/fluent-bit.yaml
        read_only: true
      - type: bind
        source: ./fluentbit/parsers.conf
        target: /fluent-bit/etc/parsers.conf
        read_only: true
      - type: bind
        source: ./fluentbit/parse_events.lua
        target: /fluent-bit/etc/parse_events.lua
        read_only: true
      - type: bind
        source: ./watcher/logs
        target: /home/watcher/watcher/logs
        read_only: true
    environment:
      # Topolograph configuration
      TOPOLOGRAPH_HOST: ${TOPOLOGRAPH_HOST}
      TOPOLOGRAPH_PORT: ${TOPOLOGRAPH_PORT}
      # Webhook configuration
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_HOST: ${WEBHOOK_HOST:-192.168.0.33}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8081}
    restart: unless-stopped
    networks:
      - internal
    profiles:
      - fluentbit  # Use profile to control which service runs

networks:
  internal:
    external:
      name: topolograph_backend
